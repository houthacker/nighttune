name: Build and push Nighttune Docker image

on:

  # Trigger from creating new tags
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

# Defines two custom environment variables for the workflow. These are used for the Container registry domain, and a name for the Docker image that this workflow builds.
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-image:
    environment: 'production'
    runs-on: ubuntu-latest

    # Set the permissions granted to the `GITHUB_TOKEN` for the actions in this job.
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
      #
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Enable experimental features for buildx
        run: |
          echo '{"experimental": true}' | sudo tee -a /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      - name: Generate .env file
        run: |
          echo "NEXT_PUBLIC_BACKEND_BASE_URL=${{ secrets.BACKEND_BASE_URL }}" > .env.production
          echo "NEXT_PUBLIC_CAPTCHA_SITEKEY=${{ secrets.CAPTCHA_SITEKEY }}" >> .env.production
          echo "NEXT_PUBLIC_CAPTCHA_BASE_URL=${{ vars.CAPTCHA_BASE_URL  }}" >> .env.production
          echo "NEXT_PUBLIC_NT_VERSION=${GITHUB_REF#refs/tags/}" >> .env.production
          echo "NEXT_PUBLIC_NT_BUGS_OVERVIEW=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/issues?q=is%3Aissue+state%3Aopen+label%3Abug" >> .env.production
          echo "NEXT_PUBLIC_DEPLOY_ENV=production" >> .env.production
          echo "NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.SERVER_ACTIONS_ENCRYPTION_KEY }}" >> .env.production
          echo "NEXT_PUBLIC_OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=${{ vars.DLOG_URL }}" >> .env.production 
      
      - name: Copy generated .env file to production host
        id: copy-env-file
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          source: ".env.production"
          target: /tmp

      # Build the Docker image and push it to the configured registry.
      # When booted, the container pulls in the .env.production variables.
      # See scripts/entrypoint.sh for that
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      
      # This step generates an artifact attestation for the image, which is an unforgeable statement about where and how it was built. It increases supply chain security for people who consume the image. For more information, see [Using artifact attestations to establish provenance for builds](/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds).
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME}}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      
  deploy-to-production:
    needs: build-and-push-image
    environment: 'production'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Deploy to production env
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            echo "*** Moving environment file in place"
            mv /tmp/.env.production ${{ vars.NT_CONFIG_DIR }}/${{ vars.NT_ENV_FILE_NAME }}
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            echo "*** Pulling latest ${{ github.actor }}/${{ env.IMAGE_NAME }} from ${{ env.REGISTRY }} ***"
            docker compose -f ${{ secrets.DEPLOY_SSH_DOCKER_COMPOSE_FILE }} pull ${{ vars.DOCKER_COMPOSE_SERVICE_NAME }}
            echo "*** Starting ${{ env.IMAGE_NAME }}:${GITHUB_REF#refs/tags/} ***"
            docker compose -f ${{ secrets.DEPLOY_SSH_DOCKER_COMPOSE_FILE }} up -d
            echo "*** Cleaning up unused images ***"
            docker image prune -f
